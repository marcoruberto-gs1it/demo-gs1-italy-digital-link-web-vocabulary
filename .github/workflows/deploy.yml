name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main # Cambia in 'master' se il tuo branch principale si chiama master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Angular project
        # Inserisce dinamicamente il nome del tuo repository come base-href
        run: npx ng build --base-href=/${{ github.event.repository.name }}/

      - name: 🛠️ Fix SPA Routing (404 Trick)
        # Copia index.html in 404.html per ingannare GitHub Pages e fargli gestire le rotte (come /01/gtin)
        run: cp dist/*/browser/index.html dist/*/browser/404.html || cp dist/*/index.html dist/*/404.html

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # SOSTITUISCI QUI SOTTO CON IL NOME DEL TUO PROGETTO (guarda in angular.json o nella cartella dist)
          # Se usi Angular 17 o superiore con esbuild, di solito il percorso finisce con /browser
          publish_dir: ./dist/demo/browser/
